name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true   # vendor/ghostty-web (outer only; flip to `recursive` if lib needs the inner ghostty tree)
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: cd apps/web && bunx vite build
