name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true   # daemon tests read vendor/ghostty-web/lib TS; the WEB build uses the committed packages/ghostty-web-dist prebuilt
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: cd apps/web && bunx vite build
