# Claude Code's OSC title can distinguish working from not-working, but never
# blocked; see docs/research/cc-codex-hook-contract.md Claim 6 / §4.

# Doc-grounded: docs/research/herdr-agent-state.md §6, rule osc_title_working.
[[rules]]
id = "osc_title_working"
state = "working"
priority = 1100
region = "osc_title"
regex = ['^[\x{2800}-\x{28FF}] ']

# Doc-grounded: docs/research/herdr-agent-state.md §6, ctrl+o transcript viewer.
[[rules]]
id = "transcript_viewer"
state = "unknown"
priority = 1000
region = "whole_recent"
contains = ["showing detailed transcript", "ctrl+o"]
skip_state_update = true

# Doc-grounded: docs/research/herdr-agent-state.md §6, prompt_box_body idle marker.
[[rules]]
id = "prompt_box_idle"
state = "idle"
priority = 950
region = "prompt_box_body"
line_regex = ['^\s*❯']

# Doc-grounded: docs/research/herdr-agent-state.md §6, numbered proceed prompt.
[[rules]]
id = "numbered_proceed_blocked"
state = "blocked"
priority = 850
region = "after_last_horizontal_rule"
contains = ["do you want to proceed?"]
line_regex = ['(?i)^\s*❯?\s*1\.\s*yes\b', '(?i)^\s*❯?\s*2\.\s*no\b']

# Doc-grounded: docs/research/herdr-agent-state.md §6, rule osc_title_idle.
[[rules]]
id = "osc_title_idle"
state = "idle"
priority = 250
region = "osc_title"
regex = ['^\x{2733} ']
